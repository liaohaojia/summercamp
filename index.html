<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="26暑假衔接学习计划，包含 C++ 与高等数学上册两门课程的轮次安排与视频资源。">
  <title>26暑假衔接学习计划</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <main>
      <section class="tabs" aria-label="学科切换">
        <button class="tab-button is-active" type="button" data-target="cpp-panel">C++</button>
        <button class="tab-button" type="button" data-target="math-panel">高等数学上册</button>
      </section>

      <section id="cpp-panel" class="subject-panel is-active" aria-labelledby="cpp-heading">
        <h1 id="cpp-heading" class="subject-title">C++</h1>
        <div id="cpp-rounds" class="round-grid"></div>
        <section class="resource-panel">
          <h2 class="resource-title">参考资源</h2>
          <div id="cpp-resources" class="resource-list"></div>
        </section>
      </section>

      <section id="math-panel" class="subject-panel" aria-labelledby="math-heading">
        <h1 id="math-heading" class="subject-title">高等数学上册</h1>
        <div id="math-rounds" class="round-grid"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
